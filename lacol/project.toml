[project]
name = "local-supervisor-agent"
version = "0.1.0"
description = "LangGraph supervisor agent with grep/glob/read/write specialists, backed by LM Studio"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.50",
    "langchain-openai>=0.2.14",
    "langchain-core>=0.3.28",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]

[project.scripts]
agent = "supervisor_agent.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/supervisor_agent"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]