<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="js/vendor/prism.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/lesson.css" />
</head>
<body>

<!-- Auth Overlay -->
<div id="auth-overlay">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">Py</div>
      <span class="auth-logo-text">Python Course</span>
    </div>
    <div id="auth-page"></div>
  </div>
</div>

<!-- App Shell -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Py</div>
      <span class="sidebar-title">Python Course</span>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-avatar">U</div>
      <span class="sidebar-username" id="sidebar-username">Loading...</span>
      <button class="sidebar-logout" id="sidebar-logout">Logout</button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Rendered by sidebar.js -->
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-area">
      <div class="content-inner">
        <!-- Dashboard Page -->
        <div class="page" id="page-dashboard">
          <!-- Rendered by dashboard.js -->
        </div>
        <!-- Lesson Page -->
        <div class="page" id="page-lesson">
          <!-- Rendered by lesson.js -->
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Mobile sidebar toggle -->
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Vendor -->
<script src="js/vendor/marked.min.js"></script>
<script src="js/vendor/prism.js"></script>
<script src="js/vendor/prism-autoloader.min.js"></script>

<!-- App scripts -->
<script src="js/store.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components/toast.js"></script>
<script src="js/components/progress-ring.js"></script>
<script src="js/components/sidebar.js"></script>
<script src="js/components/lesson-nav.js"></script>
<script src="js/pages/auth-page.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/lesson.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
</body>
</html>
